<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق قائمة المهام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-tasks"></i> قائمة المهام</h1>
            <p class="subtitle">نظم مهامك بكفاءة وأنجزها بسهولة</p>
        </div>

        <!-- قسم الإدخال -->
        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="أدخل مهمة جديدة..."
                    class="task-input"
                >
                <select id="prioritySelect" class="priority-select">
                    <option value="low">منخفضة</option>
                    <option value="medium" selected>متوسطة</option>
                    <option value="high">عالية</option>
                </select>
                <button id="addBtn" class="add-btn">
                    <i class="fas fa-plus"></i> إضافة
                </button>
            </div>
        </div>

        <!-- قسم الفلاتر -->
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">
                <i class="fas fa-list"></i> الكل
            </button>
            <button class="filter-btn" data-filter="active">
                <i class="fas fa-circle"></i> النشطة
            </button>
            <button class="filter-btn" data-filter="completed">
                <i class="fas fa-check-circle"></i> المنجزة
            </button>
        </div>

        <!-- قسم الإحصائيات -->
        <div class="stats-section">
            <div class="stat-card">
                <i class="fas fa-list-check"></i>
                <div>
                    <span class="stat-label">المهام الكلية</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-hourglass-end"></i>
                <div>
                    <span class="stat-label">المهام النشطة</span>
                    <span class="stat-value" id="activeCount">0</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check"></i>
                <div>
                    <span class="stat-label">المهام المنجزة</span>
                    <span class="stat-value" id="completedCount">0</span>
                </div>
            </div>
        </div>

        <!-- قائمة المهام -->
        <div class="tasks-section">
            <div id="tasksList" class="tasks-list">
                <!-- سيتم ملء المهام هنا -->
            </div>
            <div id="emptyState" class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>لا توجد مهام حالياً</p>
                <small>أضف مهمة جديدة للبدء</small>
            </div>
        </div>

        <!-- قسم الإجراءات -->
        <div class="actions-section">
            <button id="clearCompletedBtn" class="action-btn clear-btn">
                <i class="fas fa-trash-alt"></i> مسح المهام المنجزة
            </button>
            <button id="exportBtn" class="action-btn export-btn">
                <i class="fas fa-download"></i> تحميل البيانات
            </button>
            <button id="clearAllBtn" class="action-btn danger-btn">
                <i class="fas fa-broom"></i> مسح الكل
            </button>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast" class="toast"></div>

    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
